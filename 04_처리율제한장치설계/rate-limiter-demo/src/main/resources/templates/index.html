<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Rate Limiter Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 960px; margin: 32px auto; padding: 0 16px; color: #1f2328; }
        h1 { margin: 0 0 4px; }
        .status { display: inline-block; margin-left: 12px; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .status.connected { background: #dafbe1; color: #1a7f37; }
        .status.disconnected { background: #ffebe9; color: #cf222e; }

        .tabs { display: flex; gap: 4px; border-bottom: 1px solid #d0d7de; margin-top: 24px; }
        .tab { padding: 8px 16px; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; color: #57606a; }
        .tab.active { background: #fff; border-color: #d0d7de; color: #1f2328; font-weight: 600; margin-bottom: -1px; }

        .panel { display: none; padding-top: 20px; }
        .panel.active { display: block; }
        .meta { color: #57606a; font-size: 14px; margin-bottom: 24px; }

        /* Token Bucket gauge (horizontal) */
        .gauge-h { display: flex; gap: 12px; margin: 24px 0; }
        .token { width: 48px; height: 48px; border-radius: 50%; background: #d0d7de; transition: background 0.15s; }
        .token.filled { background: #1a7f37; }

        /* Leaky Bucket gauge (vertical water tank) */
        .tank-wrap { display: flex; flex-direction: column; align-items: center; margin: 24px 0; }
        .tank { display: flex; flex-direction: column-reverse; width: 80px; height: 100px; border: 2px solid #57606a; border-radius: 4px 4px 8px 8px; overflow: hidden; background: #f6f8fa; }
        .tank .cell { flex: 1; border-top: 1px solid #eaeef2; transition: background 0.2s; }
        .tank .cell.filled { background: #0969da; }
        .tank.full .cell.filled:nth-last-child(-n+2) { animation: pulse-red 0.8s infinite; }
        @keyframes pulse-red { 0%,100% { background: #0969da; } 50% { background: #cf222e; } }
        .nozzle { width: 16px; height: 16px; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #57606a; }
        .drip { font-size: 22px; height: 28px; opacity: 0; transition: opacity 0.15s; }
        .drip.show { opacity: 1; }

        /* Fixed Window panel */
        .clock-bar { display: flex; align-items: center; gap: 10px; margin-top: 14px; padding: 10px 14px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 8px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
        .clock-label { font-size: 12px; color: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .clock-countdown { font-size: 16px; font-weight: 600; color: #0969da; min-width: 56px; text-align: right; }
        .clock-countdown.warn { color: #bf8700; }
        .clock-countdown.danger { color: #cf222e; animation: pulse-text 0.6s infinite; }
        @keyframes pulse-text { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
        .clock-bar-track { flex: 1; height: 6px; background: #d0d7de; border-radius: 3px; overflow: hidden; margin-left: 6px; }
        .clock-bar-fill { display: block; height: 100%; width: 0%; background: #0969da; transition: width 0.1s linear, background 0.2s; }
        .clock-bar-fill.warn { background: #bf8700; }
        .clock-bar-fill.danger { background: #cf222e; }

        .windows-row { display: flex; flex-direction: row; gap: 12px; overflow-x: auto; padding: 8px 4px; margin: 24px 0; min-height: 200px; }
        .window-block { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; opacity: 0.65; transition: opacity 0.2s; }
        .window-block.active { opacity: 1; }
        .window-time { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #57606a; margin-bottom: 6px; }
        .window-block.active .window-time { color: #1f883d; font-weight: 600; }
        .window-bucket { display: flex; flex-direction: column-reverse; width: 56px; height: 130px; border: 2px solid #d0d7de; border-radius: 4px; overflow: hidden; background: #f6f8fa; }
        .window-block.active .window-bucket { border-color: #1f883d; box-shadow: 0 0 0 2px rgba(31, 136, 61, 0.2); }
        .window-bucket .cell { flex: 1; border-top: 1px solid #eaeef2; transition: background 0.2s; }
        .window-bucket .cell.filled { background: #8250df; }
        .window-count { font-size: 11px; color: #57606a; margin-top: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
        .window-block.active .window-count { color: #1f883d; font-weight: 600; }
        .window-block.entering { animation: slide-in 0.3s ease-out; }
        @keyframes slide-in { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        button { padding: 10px 20px; font-size: 16px; background: #0969da; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
        button:active { background: #0860c1; }

        .log { margin-top: 32px; border-top: 1px solid #d0d7de; padding-top: 16px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; max-height: 320px; overflow-y: auto; }
        .log .row { padding: 4px 0; border-bottom: 1px solid #f6f8fa; }
        .log .ok { color: #1a7f37; }
        .log .ko { color: #cf222e; }
        .log .info { color: #0969da; }
        .log .ts { color: #57606a; margin-right: 8px; }
        .log .reqid { color: #6e7781; }
        .log .row.highlight { background: #fff8c5; }
    </style>
</head>
<body>
<h1>Rate Limiter Demo
    <span id="status" class="status disconnected">disconnected</span>
</h1>

<div class="tabs">
    <div class="tab active" data-tab="token">Token Bucket</div>
    <div class="tab" data-tab="leaky">Leaky Bucket</div>
    <div class="tab" data-tab="fixed">Fixed Window</div>
</div>

<!-- Token Bucket panel -->
<div class="panel active" data-panel="token">
    <div class="meta">
        capacity = <span th:text="${tokenCapacity}">5</span>
        · refill: 1 token / <span th:text="${tokenRefillIntervalSeconds}">10</span>s
    </div>
    <div id="token-gauge" class="gauge-h" th:attr="data-capacity=${tokenCapacity}"></div>
    <button id="token-btn" type="button">Call /api/token/ping</button>
    <div class="log" id="token-log"></div>
</div>

<!-- Leaky Bucket panel -->
<div class="panel" data-panel="leaky">
    <div class="meta">
        capacity = <span th:text="${leakyCapacity}">5</span>
        · leak rate: 1 req / <span th:text="${leakyLeakIntervalSeconds}">3</span>s
    </div>
    <div class="tank-wrap">
        <div id="leaky-tank" class="tank" th:attr="data-capacity=${leakyCapacity}"></div>
        <div class="nozzle"></div>
        <div id="leaky-drip" class="drip">💧</div>
    </div>
    <button id="leaky-btn" type="button">Call /api/leaky/ping</button>
    <div class="log" id="leaky-log"></div>
</div>

<!-- Fixed Window panel -->
<div class="panel" data-panel="fixed">
    <div class="meta">
        threshold = <span th:text="${fixedThreshold}">5</span> req
        · window: <span th:text="${fixedWindowSeconds}">10</span>s
        · 최신 윈도우는 왼쪽, 최대 10개 표시
    </div>
    <div class="clock-bar">
        <span class="clock-label">다음 윈도우까지</span>
        <span id="fixed-countdown" class="clock-countdown">--</span>
        <span class="clock-bar-track"><span id="fixed-progress" class="clock-bar-fill"></span></span>
    </div>
    <div id="fixed-windows" class="windows-row" th:attr="data-threshold=${fixedThreshold}"></div>
    <button id="fixed-btn" type="button">Call /api/fixed/ping</button>
    <div class="log" id="fixed-log"></div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const TOKEN_CAPACITY = /*[[${tokenCapacity}]]*/ 5;
    const LEAKY_CAPACITY = /*[[${leakyCapacity}]]*/ 5;
    const FIXED_THRESHOLD = /*[[${fixedThreshold}]]*/ 5;
    const FIXED_WINDOW_SECONDS = /*[[${fixedWindowSeconds}]]*/ 10;
    const FIXED_WINDOW_MS = FIXED_WINDOW_SECONDS * 1000;
    const FIXED_MAX_WINDOWS = 10;
    /*]]>*/

    // ------- 탭 전환 -------
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const name = tab.dataset.tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
            document.querySelectorAll('.panel').forEach(p =>
                p.classList.toggle('active', p.dataset.panel === name));
        });
    });

    // ------- 연결 상태 -------
    const statusEl = document.getElementById('status');
    const connStatus = { token: false, leaky: false, fixed: false };
    function refreshStatus() {
        const all = connStatus.token && connStatus.leaky && connStatus.fixed;
        statusEl.className = 'status ' + (all ? 'connected' : 'disconnected');
        statusEl.textContent = all ? 'connected' : 'disconnected';
    }

    // ------- 시각 유틸 -------
    function parseEvent(e) {
        try { return JSON.parse(e.data); }
        catch (err) { console.warn('bad SSE event', e.type, e.data, err); return null; }
    }

    function ts() {
        const d = new Date();
        return String(d.getHours()).padStart(2, '0') + ':' +
               String(d.getMinutes()).padStart(2, '0') + ':' +
               String(d.getSeconds()).padStart(2, '0') + '.' +
               String(d.getMilliseconds()).padStart(3, '0');
    }

    function appendRow(logEl, html, reqId) {
        const row = document.createElement('div');
        row.className = 'row';
        if (reqId) row.dataset.reqid = reqId;
        row.innerHTML = '<span class="ts">' + ts() + '</span>' + html;
        if (reqId) {
            row.addEventListener('mouseenter', () => highlightReqId(logEl, reqId, true));
            row.addEventListener('mouseleave', () => highlightReqId(logEl, reqId, false));
        }
        logEl.prepend(row);
    }

    function highlightReqId(logEl, reqId, on) {
        logEl.querySelectorAll('.row[data-reqid="' + reqId + '"]')
            .forEach(r => r.classList.toggle('highlight', on));
    }

    // ------- Token Bucket -------
    const tokenGaugeEl = document.getElementById('token-gauge');
    const tokenLogEl = document.getElementById('token-log');
    const tokenBtnEl = document.getElementById('token-btn');

    for (let i = 0; i < TOKEN_CAPACITY; i++) {
        const dot = document.createElement('div');
        dot.className = 'token';
        tokenGaugeEl.appendChild(dot);
    }
    const tokenDots = tokenGaugeEl.querySelectorAll('.token');

    function renderTokens(n) {
        tokenDots.forEach((dot, i) => dot.classList.toggle('filled', i < n));
    }

    const tokenSse = new EventSource('/api/token/stream');
    tokenSse.addEventListener('open', () => { connStatus.token = true; refreshStatus(); });
    tokenSse.addEventListener('error', () => { connStatus.token = false; refreshStatus(); });

    tokenSse.addEventListener('init', e => {
        const d = parseEvent(e); if (!d) return;
        renderTokens(d.tokens);
    });
    tokenSse.addEventListener('consume', e => {
        const d = parseEvent(e); if (!d) return;
        renderTokens(d.tokens);
        appendRow(tokenLogEl, '<span class="ok">200 OK</span>  tokens=' + d.tokens);
    });
    tokenSse.addEventListener('refill', e => {
        const d = parseEvent(e); if (!d) return;
        renderTokens(d.tokens);
        appendRow(tokenLogEl, '<span class="info">↻ Refill</span>  tokens=' + d.tokens);
    });
    tokenSse.addEventListener('rejected', e => {
        const d = parseEvent(e); if (!d) return;
        renderTokens(d.tokens);
        appendRow(tokenLogEl, '<span class="ko">429 Rejected</span>  tokens=' + d.tokens);
    });

    tokenBtnEl.addEventListener('click', () => {
        fetch('/api/token/ping').catch(err => console.warn('token fetch failed', err));
    });

    // ------- Leaky Bucket -------
    const leakyTankEl = document.getElementById('leaky-tank');
    const leakyDripEl = document.getElementById('leaky-drip');
    const leakyLogEl = document.getElementById('leaky-log');
    const leakyBtnEl = document.getElementById('leaky-btn');

    for (let i = 0; i < LEAKY_CAPACITY; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        leakyTankEl.appendChild(cell);
    }
    const leakyCells = leakyTankEl.querySelectorAll('.cell');

    function renderLeaky(size) {
        leakyCells.forEach((c, i) => c.classList.toggle('filled', i < size));
        leakyTankEl.classList.toggle('full', size >= LEAKY_CAPACITY);
    }

    function showDrip() {
        leakyDripEl.classList.add('show');
        setTimeout(() => leakyDripEl.classList.remove('show'), 500);
    }

    const leakySse = new EventSource('/api/leaky/stream');
    leakySse.addEventListener('open', () => { connStatus.leaky = true; refreshStatus(); });
    leakySse.addEventListener('error', () => { connStatus.leaky = false; refreshStatus(); });

    leakySse.addEventListener('init', e => {
        const d = parseEvent(e); if (!d) return;
        renderLeaky(d.size);
    });
    leakySse.addEventListener('accepted', e => {
        const d = parseEvent(e); if (!d) return;
        renderLeaky(d.size);
        appendRow(leakyLogEl,
            '<span class="ok">202 Accepted</span>  ' +
            '<span class="reqid">reqId=' + d.reqId + '</span>  size=' + d.size + '/' + LEAKY_CAPACITY,
            d.reqId);
    });
    leakySse.addEventListener('processed', e => {
        const d = parseEvent(e); if (!d) return;
        renderLeaky(d.size);
        showDrip();
        appendRow(leakyLogEl,
            '<span class="info">✓ Processed</span>  ' +
            '<span class="reqid">reqId=' + d.reqId + '</span>  size=' + d.size + '/' + LEAKY_CAPACITY,
            d.reqId);
    });
    leakySse.addEventListener('rejected', e => {
        const d = parseEvent(e); if (!d) return;
        renderLeaky(d.size);
        appendRow(leakyLogEl,
            '<span class="ko">429 Rejected</span>  size=' + d.size + '/' + LEAKY_CAPACITY + '  queue full');
    });

    leakyBtnEl.addEventListener('click', () => {
        fetch('/api/leaky/ping').catch(err => console.warn('leaky fetch failed', err));
    });

    // ------- Fixed Window -------
    const fixedWindowsEl = document.getElementById('fixed-windows');
    const fixedLogEl = document.getElementById('fixed-log');
    const fixedBtnEl = document.getElementById('fixed-btn');

    function fmtClock(ms) {
        const d = new Date(ms);
        return String(d.getHours()).padStart(2, '0') + ':' +
               String(d.getMinutes()).padStart(2, '0') + ':' +
               String(d.getSeconds()).padStart(2, '0');
    }

    function buildWindowBlock(windowStart, count) {
        const block = document.createElement('div');
        block.className = 'window-block entering';
        block.dataset.windowStart = String(windowStart);

        const time = document.createElement('div');
        time.className = 'window-time';
        time.textContent = fmtClock(windowStart);

        const bucket = document.createElement('div');
        bucket.className = 'window-bucket';
        for (let i = 0; i < FIXED_THRESHOLD; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            bucket.appendChild(cell);
        }

        const countEl = document.createElement('div');
        countEl.className = 'window-count';

        block.appendChild(time);
        block.appendChild(bucket);
        block.appendChild(countEl);
        setTimeout(() => block.classList.remove('entering'), 300);

        renderWindowBlock(block, count);
        return block;
    }

    function renderWindowBlock(block, count) {
        const cells = block.querySelectorAll('.window-bucket .cell');
        cells.forEach((c, i) => c.classList.toggle('filled', i < count));
        block.querySelector('.window-count').textContent = count + ' / ' + FIXED_THRESHOLD;
        block.classList.toggle('full', count >= FIXED_THRESHOLD);
    }

    function ensureCurrentWindow(windowStart, count) {
        const first = fixedWindowsEl.firstElementChild;
        if (!first || first.dataset.windowStart !== String(windowStart)) {
            fixedWindowsEl.querySelectorAll('.window-block')
                .forEach(b => b.classList.remove('active'));
            const block = buildWindowBlock(windowStart, count);
            block.classList.add('active');
            fixedWindowsEl.prepend(block);
            while (fixedWindowsEl.children.length > FIXED_MAX_WINDOWS) {
                fixedWindowsEl.removeChild(fixedWindowsEl.lastElementChild);
            }
            return block;
        }
        renderWindowBlock(first, count);
        return first;
    }

    const fixedSse = new EventSource('/api/fixed/stream');
    fixedSse.addEventListener('open', () => { connStatus.fixed = true; refreshStatus(); });
    fixedSse.addEventListener('error', () => { connStatus.fixed = false; refreshStatus(); });

    fixedSse.addEventListener('init', e => {
        const d = parseEvent(e); if (!d) return;
        fixedWindowsEl.innerHTML = '';
        ensureCurrentWindow(d.windowStart, d.count);
    });
    fixedSse.addEventListener('window_open', e => {
        const d = parseEvent(e); if (!d) return;
        ensureCurrentWindow(d.windowStart, d.count);
        appendRow(fixedLogEl,
            '<span class="info">▷ Window open</span>  ' + fmtClock(d.windowStart));
    });
    fixedSse.addEventListener('accepted', e => {
        const d = parseEvent(e); if (!d) return;
        ensureCurrentWindow(d.windowStart, d.count);
        appendRow(fixedLogEl,
            '<span class="ok">200 OK</span>  ' + fmtClock(d.windowStart) +
            '  count=' + d.count + '/' + d.threshold);
    });
    fixedSse.addEventListener('rejected', e => {
        const d = parseEvent(e); if (!d) return;
        ensureCurrentWindow(d.windowStart, d.count);
        appendRow(fixedLogEl,
            '<span class="ko">429 Rejected</span>  ' + fmtClock(d.windowStart) +
            '  count=' + d.count + '/' + d.threshold);
    });

    fixedBtnEl.addEventListener('click', () => {
        fetch('/api/fixed/ping').catch(err => console.warn('fixed fetch failed', err));
    });

    // ------- Fixed Window: 다음 윈도우 카운트다운 -------
    const fixedCountdownEl = document.getElementById('fixed-countdown');
    const fixedProgressEl = document.getElementById('fixed-progress');

    function tickClock() {
        const now = Date.now();
        const remainMs = FIXED_WINDOW_MS - (now % FIXED_WINDOW_MS);
        const elapsedRatio = 1 - (remainMs / FIXED_WINDOW_MS);

        fixedCountdownEl.textContent = (remainMs / 1000).toFixed(1) + 's';
        fixedProgressEl.style.width = (elapsedRatio * 100).toFixed(1) + '%';

        const danger = remainMs <= 1500;
        const warn = !danger && remainMs <= 3000;
        fixedCountdownEl.classList.toggle('danger', danger);
        fixedCountdownEl.classList.toggle('warn', warn);
        fixedProgressEl.classList.toggle('danger', danger);
        fixedProgressEl.classList.toggle('warn', warn);
    }
    tickClock();
    setInterval(tickClock, 100);
</script>
</body>
</html>
