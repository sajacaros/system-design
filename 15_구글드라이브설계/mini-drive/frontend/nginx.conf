# 프런트엔드 정적 서빙 + SPA fallback.
# /api, /ws, /share 프록시는 루트 인프라(reverse proxy/compose)가 백엔드로 라우팅한다고 가정한다.
# 이 설정은 프런트 컨테이너 자체용 — API/WS 업스트림은 인프라 소유이므로 여기서 하드코딩하지 않는다.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자산 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
