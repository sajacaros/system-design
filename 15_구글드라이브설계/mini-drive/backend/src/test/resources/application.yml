spring:
  datasource:
    url: jdbc:h2:mem:minidrive;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

jwt:
  secret: test-secret-key-for-unit-tests-only-must-be-at-least-256-bits-long-xxxx
  access-token-ttl-seconds: 1800
  refresh-token-ttl-seconds: 1209600

storage:
  endpoint: http://localhost:9000
  region: us-east-1
  access-key: test
  secret-key: test
  bucket: minidrive-test
  path-style-access: true
  internal-presign-ttl-seconds: 30
