spring:
  application:
    name: mini-drive-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/minidrive}
    username: ${DB_USERNAME:minidrive}
    password: ${DB_PASSWORD:minidrive}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:104857600}      # 100MB
      max-request-size: ${MAX_REQUEST_SIZE:104857600}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key-min-256-bits}
  access-token-ttl-seconds: ${JWT_ACCESS_TTL:1800}        # 30 min
  refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}   # 14 days

storage:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  region: ${MINIO_REGION:us-east-1}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:minidrive}
  path-style-access: true
  # v1.6: internal-only presign for the gateway download (X-Accel-Redirect). Never exposed to
  # the browser; nginx consumes it immediately. MINIO_PUBLIC_ENDPOINT removed (no browser presign).
  # 60s is pure margin for the "issue presign -> nginx initiates MinIO request" gap (~ms); expiry is
  # checked only at request start, so a longer transfer still completes. Not a security boundary
  # (authz already happened upstream in the controller), so the value can be raised freely.
  internal-presign-ttl-seconds: ${INTERNAL_PRESIGN_TTL:60}
