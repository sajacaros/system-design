# Mini Drive — Nginx 리버스 프록시 (인프라 엔지니어 소유)
# /api, /ws → backend:8080 (WebSocket upgrade 지원), / → 프런트 정적 SPA

# WebSocket Upgrade 헤더 매핑
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream minidrive_backend {
    server backend:8080;
}

# MinIO S3 API upstream (도커 네트워크 내부 전용, host published 아님).
# X-Accel-Redirect 내부 재진입(/_minio/) 에서만 접근한다. 계약 v1.6.
upstream minidrive_minio {
    server minio:9000;
}

# 프런트 SPA는 프런트 이미지의 자체 nginx(컨테이너 내부 :80)가 서빙한다.
# 루트 nginx는 볼륨 공유 대신 프록시로 위임한다(빌드 산출물 경로 불일치 회피).
upstream minidrive_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # 업로드 파일 크기 제한 (대용량 업로드 허용)
    client_max_body_size 0;

    # ── REST API ─────────────────────────────────────────────
    # /api/ 프리픽스 전체를 백엔드로 프록시한다.
    # 공개 공유 조회 GET /api/public/share/{token} (계약 v1.2, 비인증)도
    # 이 블록으로 백엔드에 전달된다 → 별도 /share 프록시 블록 불요 (qa I-2).
    location /api/ {
        proxy_pass         http://minidrive_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket + STOMP (실시간 알림/동기화) ────────────────
    location /ws {
        proxy_pass         http://minidrive_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── MinIO 내부 재진입 (X-Accel-Redirect 전용) ────────────────
    # 계약 v1.6 "다운로드 모델 v1.6 — 게이트웨이 경유".
    # 흐름: 브라우저 → /api/.../download → 백엔드(실시간 인가) → 바디 없는 200 +
    #   X-Accel-Redirect: /_minio/<objectPath>?<presignedQuery> 헤더 →
    #   nginx가 이 location으로 내부 재진입 → MinIO에서 직접 스트리밍(백엔드 비경유).
    #
    # `internal`: 외부 직접 접근 차단. 브라우저가 /_minio/... 를 직접 호출하면 404.
    #             X-Accel-Redirect 를 통한 nginx 내부 재진입만 허용된다.
    # `proxy_pass http://minidrive_minio/;` 의 trailing slash 로 /_minio/ prefix 가
    #   제거되어, 백엔드가 넘긴 <objectPath>?<presignedQuery> 가 MinIO 루트에 그대로
    #   전달된다(예: /_minio/minidrive/users/{u}/{f}?X-Amz-Signature=... →
    #   http://minio:9000/minidrive/users/{u}/{f}?X-Amz-Signature=...).
    #   SigV4 서명 쿼리스트링은 nginx 가 변형 없이 그대로 통과시켜야 서명이 유효하다.
    location /_minio/ {
        internal;
        proxy_pass http://minidrive_minio/;
        proxy_http_version 1.1;

        # 인증/리다이렉트 컨텍스트만 전달. Authorization 등 클라이언트 헤더는 비전달.
        # MinIO 는 URL 쿼리의 SigV4 presign 으로 인증하므로 별도 인증 헤더 불필요.
        # 백엔드 presign 은 endpoint http://minio:9000 으로 SigV4 서명한다(SignedHeaders=host).
        # named upstream 사용 시 $proxy_host 는 upstream 이름(minidrive_minio, 언더스코어 포함)으로
        # 해석되어 (1) MinIO 가 "invalid hostname" 으로 거부하고 (2) 서명 host 와 불일치한다.
        # → 서명된 값과 동일하게 Host 를 minio:9000 으로 고정한다.
        proxy_set_header Host       minio:9000;
        proxy_set_header Connection "";
        # 인증 다운로드(/api/files/...)는 클라이언트가 Authorization: Bearer 를 보낸다.
        # 이 헤더를 MinIO 로 전달하면 presign 쿼리(SigV4)와 함께 "multiple authentication
        # types" 로 거부된다. MinIO 인증은 오직 URL 쿼리 presign 으로만 하므로 비운다.
        proxy_set_header Authorization "";

        # ── 응답 헤더 우선순위 (계약 v1.6 §응답 헤더 규칙) ──
        # 백엔드 다운로드 컨트롤러가 설정한 Content-Type / Content-Disposition 이
        # 클라이언트로 전달되어야 한다. MinIO 응답이 내려보내는 동일 헤더가
        # 이를 덮어쓰지 않도록 MinIO 측 헤더를 숨긴다.
        # (X-Accel-Redirect 시 nginx 는 원 요청의 응답 헤더 = 백엔드 헤더를 유지한다.)
        proxy_hide_header Content-Type;
        proxy_hide_header Content-Disposition;
        # MinIO/S3 부가 헤더도 클라이언트 노출 불필요 — 정리.
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-meta-server-side-encryption;
        proxy_hide_header Server;

        # ── 대용량 스트리밍 ──
        # 버퍼링 비활성: 디스크/메모리에 적재하지 않고 MinIO→클라이언트로 흘려보낸다.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 프런트 SPA (프런트 컨테이너 자체 nginx로 프록시) ─────────
    # 사람이 여는 공유 페이지 /share/{token} 등 모든 SPA 라우트는
    # 프런트 컨테이너의 nginx가 index.html 폴백으로 처리한다.
    # 그 페이지가 위 공개 API GET /api/public/share/{token} 를 호출 → 충돌 없음 (qa I-2).
    location / {
        proxy_pass         http://minidrive_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
