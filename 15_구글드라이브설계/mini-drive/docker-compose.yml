# Mini Drive — 루트 인프라 구성 (인프라 엔지니어 소유)
# 검증: `docker compose config` (구문 검증만). `up`/`down -v`는 사람 승인 게이트.

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: minidrive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minidrive}
      POSTGRES_USER: ${POSTGRES_USER:-minidrive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minidrive} -d ${POSTGRES_DB:-minidrive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - minidrive-net

  # ── MinIO (S3 호환 오브젝트 스토리지) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minidrive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    # 계약 v1.6: S3 데이터 평면(9000)은 호스트로 노출하지 않는다.
    #   브라우저-facing presigned URL 폐기 → MinIO 직접 접근 경로 제거.
    #   다운로드는 nginx /_minio/ internal location 만 도커 네트워크 내부에서 접근.
    expose:
      - "9000"                             # S3 API: 도커 네트워크 내부 전용(nginx만 접근)
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # 웹 콘솔(관리 UI, 데이터 평면과 무관 — 유지)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - minidrive-net

  # ── MinIO 버킷 초기화 (일회성) ───────────────────────────────────
  createbuckets:
    image: minio/mc:latest
    container_name: minidrive-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET:-minidrive};
      echo 'Bucket ${MINIO_BUCKET:-minidrive} ready';
      exit 0;
      "
    networks:
      - minidrive-net

  # ── 백엔드 (Spring Boot, 8080) ───────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: minidrive-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      # Spring DataSource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-minidrive}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-minidrive}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      # MinIO / S3
      # 내부 접근(put/get/delete) + 내부 전용 presign: 도커 네트워크 DNS 'minio'
      MINIO_ENDPOINT: http://minio:9000
      # 계약 v1.6: MINIO_PUBLIC_ENDPOINT 폐기.
      #   브라우저-facing presigned URL 제거 → 공개 호스트 치환 불요(백엔드 미사용).
      #   내부 presign(nginx→MinIO 접근 수단)은 호스트/스킴 무관 — nginx 가 경로+쿼리만 사용.
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
      MINIO_BUCKET: ${MINIO_BUCKET:-minidrive}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-1209600}
      # 런타임
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - minidrive-net

  # ── 프런트엔드 (자체 nginx로 SPA 서빙) ──────────────────────────
  # 프런트 이미지는 빌드된 SPA를 자체 nginx(:80)로 서빙한다.
  # 루트 nginx가 / 요청을 이 컨테이너로 프록시한다(볼륨 공유 불요).
  frontend:
    build:
      context: ./frontend
    container_name: minidrive-frontend
    restart: unless-stopped
    networks:
      - minidrive-net

  # ── Nginx 리버스 프록시 (80) ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: minidrive-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - minidrive-net

volumes:
  postgres-data:
  minio-data:

networks:
  minidrive-net:
    driver: bridge
