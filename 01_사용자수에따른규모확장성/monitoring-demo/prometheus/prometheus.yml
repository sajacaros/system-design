global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'monitoring-demo'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
