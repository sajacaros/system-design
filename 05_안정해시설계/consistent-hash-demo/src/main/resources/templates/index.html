<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Consistent Hash Demo</title>
    <style>
      :root {
        --bg: #f3efe7;
        --ink: #1f2328;
        --muted: #59636e;
        --card: rgba(255, 255, 255, 0.82);
        --line: rgba(31, 35, 40, 0.12);
        --accent: #0e7490;
        --danger: #d63d4a;
        --ok: #14804a;
        --shadow: 0 22px 50px rgba(71, 52, 27, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 181, 97, 0.28),
            transparent 28%
          ),
          radial-gradient(
            circle at top right,
            rgba(59, 176, 216, 0.16),
            transparent 24%
          ),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      }

      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 3vw, 3.2rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
        align-items: stretch;
        margin-bottom: 24px;
      }

      .hero-card,
      .panel {
        background: var(--card);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }

      .hero-card {
        padding: 26px;
      }

      .hero-card.compact {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(14, 116, 144, 0.08);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .hero-metric {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
      }

      .hero-metric strong {
        display: block;
        font-size: 24px;
        margin-top: 6px;
      }

      .hero-metric span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .tab {
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        text-align: left;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .tab.active {
        transform: translateY(-2px);
        color: var(--ink);
        background: #fff;
        border-color: rgba(14, 116, 144, 0.3);
      }

      .panel {
        display: none;
        padding: 24px;
      }

      .panel.active {
        display: block;
        animation: fade-up 0.24s ease;
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .panel-head h2 {
        margin: 0 0 6px;
        font-size: 1.45rem;
      }

      .control {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.76);
      }

      .state-strip {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .state-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 11px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        font-size: 13px;
        color: var(--ink);
      }

      .state-pill strong {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      select,
      button {
        font: inherit;
      }

      select,
      .switch button {
        padding: 9px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .switch {
        display: inline-flex;
        gap: 8px;
      }

      .server-board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 150px));
        gap: 12px;
        margin-bottom: 16px;
      }

      .server-tile {
        width: 150px;
        min-height: 240px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.82);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .server-index {
        display: inline-flex;
        margin-bottom: 10px;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(31, 35, 40, 0.06);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .server-keys {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        align-content: flex-start;
      }

      .server-tile.disabled {
        background: rgba(130, 138, 145, 0.18);
        color: #5c6670;
      }

      .server-swatch {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        margin-bottom: 12px;
      }

      .server-tile h3 {
        margin: 0 0 4px;
        font-size: 1rem;
      }

      .server-tile button {
        width: 100%;
        margin-top: 12px;
        padding: 9px 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
      }

      .server-tile button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .switch button.active {
        color: #fff;
        background: var(--ink);
        border-color: var(--ink);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .stat-card {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.74);
      }

      .stat-card .label {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .stat-card strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
        letter-spacing: -0.04em;
      }

      .compare-grid,
      .ring-grid,
      .virtual-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .sub-card {
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        min-height: 100%;
      }

      .sub-card h3 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      .bucket-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .bucket {
        padding: 14px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #fff;
        min-height: 150px;
        border-top: 8px solid #6e7781;
      }

      .bucket small,
      .server-load small,
      .legend small {
        color: var(--muted);
      }

      .token-list,
      .movement-list,
      .assignment-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(31, 35, 40, 0.06);
        font-size: 13px;
      }

      .chip.moved {
        background: rgba(214, 61, 74, 0.1);
        color: #8d2130;
      }

      .chip.changed-key {
        background: rgba(214, 61, 74, 0.14);
        color: #8d2130;
        border: 1px solid rgba(214, 61, 74, 0.22);
        font-weight: 700;
      }

      .chip-badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(214, 61, 74, 0.18);
        color: #8d2130;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .ring-card {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.78);
      }

      .ring-shell {
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.9),
          rgba(244, 238, 229, 0.92)
        );
        padding: 12px;
        min-height: 340px;
      }

      .ring-caption {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .legend {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      .dot.server {
        background: #0f172a;
      }
      .dot.key {
        background: #fff;
        border: 2px solid #111827;
      }
      .dot.moved {
        background: #d63d4a;
      }

      .server-loads {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .server-load {
        display: grid;
        grid-template-columns: 120px 1fr 56px;
        gap: 10px;
        align-items: center;
      }

      .bar {
        height: 14px;
        border-radius: 999px;
        background: rgba(31, 35, 40, 0.08);
        overflow: hidden;
      }

      .bar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
      }

      .status {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      .subtle {
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(214, 61, 74, 0.08);
        color: #932737;
        margin-top: 12px;
      }

      @media (max-width: 960px) {
        .hero,
        .tabs,
        .stats,
        .compare-grid,
        .ring-grid,
        .virtual-grid {
          grid-template-columns: 1fr;
        }

        .panel-head {
          flex-direction: column;
        }

        .server-load {
          grid-template-columns: 92px 1fr 48px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app-status" class="status" style="margin: 0 0 16px 4px">
        Loading demo state…
      </div>

      <section class="tabs">
        <button class="tab active" data-tab="modulo">Modulo Hash</button>
        <button class="tab" data-tab="ring">Consistent Hash</button>
        <button class="tab" data-tab="change">Node Change</button>
        <button class="tab" data-tab="virtual">Virtual Nodes</button>
      </section>

      <section class="panel active" data-panel="modulo">
        <div class="panel-head">
          <div>
            <h2>해시 키 재배치 문제</h2>
            <div id="modulo-state-strip" class="state-strip"></div>
          </div>
          <div class="control">
            <button id="modulo-add-key" type="button">Key 추가</button>
            <button id="modulo-reset-keys" type="button">Reset</button>
          </div>
        </div>
        <div id="modulo-server-board" class="server-board"></div>
      </section>

      <section class="panel" data-panel="ring">
        <div class="panel-head">
          <div>
            <h2>기본 Consistent Hash Lookup</h2>
            <div id="ring-state-strip" class="state-strip"></div>
          </div>
        </div>
        <div class="ring-card">
          <div id="ring-view" class="ring-shell"></div>
          <div id="ring-assignments" class="assignment-list"></div>
        </div>
      </section>

      <section class="panel" data-panel="change">
        <div class="panel-head">
          <div>
            <h2>서버 추가와 제거</h2>
            <div id="change-state-strip" class="state-strip"></div>
          </div>
          <div class="control">
            <button id="change-add" type="button">서버 추가</button>
          </div>
        </div>
        <div id="change-server-board" class="server-board"></div>
        <div class="stats" id="change-stats"></div>
        <div class="ring-card">
          <div id="change-after" class="ring-shell"></div>
        </div>
        <div class="sub-card" style="margin-top: 16px">
          <h3>방금 이동한 키</h3>
          <div id="change-movements" class="movement-list"></div>
        </div>
      </section>

      <section class="panel" data-panel="virtual">
        <div class="panel-head">
          <div>
            <h2>Virtual Nodes로 분포 균등화</h2>
            <div id="virtual-state-strip" class="state-strip"></div>
          </div>
          <div class="control">
            <label for="virtual-replicas">가상 노드 수</label>
            <select id="virtual-replicas">
              <option value="1">1</option>
              <option value="8">8</option>
              <option value="32" selected>32</option>
              <option value="128">128</option>
            </select>
          </div>
        </div>
        <div class="virtual-grid">
          <div class="ring-card">
            <div id="virtual-single" class="ring-shell"></div>
          </div>
          <div class="ring-card">
            <div id="virtual-ring" class="ring-shell"></div>
          </div>
        </div>
        <div class="compare-grid">
          <div class="sub-card">
            <h3>물리 서버만</h3>
            <div id="virtual-single-stats"></div>
          </div>
          <div class="sub-card">
            <h3>가상 노드 적용</h3>
            <div id="virtual-distribution-stats"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const state = {
        dashboard: null,
      };

      document.addEventListener("DOMContentLoaded", async () => {
        bindTabs();
        bindControls();
        await loadDashboard();
      });

      function bindTabs() {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll(".tab")
              .forEach((button) => button.classList.remove("active"));
            document
              .querySelectorAll(".panel")
              .forEach((panel) => panel.classList.remove("active"));
            tab.classList.add("active");
            document
              .querySelector(`[data-panel="${tab.dataset.tab}"]`)
              .classList.add("active");
          });
        });
      }

      function bindControls() {
        document
          .getElementById("modulo-add-key")
          .addEventListener("click", async () => {
            const data = await fetchJson(`/api/modulo/keys`, {
              method: "POST",
            });
            renderModulo(data);
          });

        document
          .getElementById("modulo-reset-keys")
          .addEventListener("click", async () => {
            const data = await fetchJson(`/api/modulo/reset`, {
              method: "POST",
            });
            renderModulo(data);
          });

        document
          .getElementById("change-add")
          .addEventListener("click", async () => {
            const scenario = await fetchJson("/api/node-change/add", { method: "POST" });
            renderNodeChange(scenario);
          });

        document
          .getElementById("virtual-replicas")
          .addEventListener("change", async (event) => {
            const data = await fetchJson(
              `/api/virtual?replicas=${event.target.value}`,
            );
            renderVirtual(data);
          });
      }

      async function loadDashboard() {
        try {
          setStatus("Loading demo state…");
          const data = await fetchJson("/api/dashboard");
          state.dashboard = data;
          renderModulo(data.modulo);
          renderRingScenario(data.ring, "ring-view", "ring-assignments");
          renderNodeChange(data.addNode);
          renderVirtual(data.virtualNodes);
          setStatus(
            "Ready. Change the controls to compare remapping and balance.",
          );
        } catch (error) {
          setStatus("Failed to load demo state.");
          showTopError(error);
        }
      }

      async function toggleClusterNode(serverId) {
        try {
          const scenario = await fetchJson(`/api/node-change/toggle?serverId=${serverId}`, {
            method: "POST",
          });
          renderNodeChange(scenario);
        } catch (error) {
          showTopError(error);
        }
      }

      async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }
        return response.json();
      }

      async function toggleModuloServer(serverId) {
        try {
          const data = await fetchJson(`/api/modulo/toggle?serverId=${serverId}`, {
            method: "POST",
          });
          renderModulo(data);
        } catch (error) {
          showTopError(error);
        }
      }

      function renderModulo(data) {
        const movedKeys = new Set(data.movements.map((movement) => movement.keyLabel));
        document.getElementById("modulo-state-strip").innerHTML = [
          statePill("current", `${data.resizedServerCount} servers`),
          statePill("previous", `${data.baselineServerCount} servers`),
          statePill("keys", `${data.afterBuckets.reduce((sum, bucket) => sum + bucket.keys.length, 0)} total`),
          statePill("formula", data.formula),
        ].join("");
        document.getElementById("modulo-server-board").innerHTML = renderModuloServerBoard(
          data.servers,
          data.afterBuckets,
          movedKeys,
        );
      }

      function renderModuloServerBoard(servers, buckets, movedKeys) {
        const bucketByServerId = new Map(
          buckets.map((bucket) => [bucket.serverId, bucket]),
        );
        return servers
          .map((server) => `
            <article class="server-tile ${server.state === "disabled" ? "disabled" : ""}">
              <div>
                <span class="server-index">index ${moduloServerIndexLabel(bucketByServerId.get(server.serverId))}</span>
                <div class="server-swatch" style="background:${server.state === "disabled" ? "#9aa4ae" : server.color}"></div>
                <h3>${server.label}</h3>
                <div class="state-strip" style="margin-top:8px">
                  <span class="state-pill"><strong>state</strong>${server.state}</span>
                </div>
                <div class="server-keys">
                  ${renderModuloServerKeys(bucketByServerId.get(server.serverId), movedKeys, server.active)}
                </div>
              </div>
              <button type="button" ${server.canToggle ? "" : "disabled"} onclick="toggleModuloServer('${server.serverId}')">${server.actionLabel}</button>
            </article>
          `)
          .join("");
      }

      function moduloServerIndexLabel(bucket) {
        return bucket ? bucket.serverIndex : "-";
      }

      function renderModuloServerKeys(bucket, movedKeys, active) {
        if (!active) {
          return '<span class="chip">inactive</span>';
        }
        if (!bucket || bucket.keys.length === 0) {
          return '<span class="chip">empty</span>';
        }
        return bucket.keys
          .map((key) => {
            const moved = movedKeys.has(key);
            return `<span class="chip${moved ? " changed-key" : ""}">${key}${moved ? '<span class="chip-badge">moved</span>' : ""}</span>`;
          })
          .join("");
      }

      function renderRingScenario(data, ringElementId, assignmentElementId) {
        const serverCount = data.before.points.filter(
          (point) => point.type === "server",
        ).length;
        document.getElementById("ring-state-strip").innerHTML = [
          statePill("servers", `${serverCount} active`),
          statePill("keys", `${data.before.assignments.length} keys`),
          statePill("mode", data.mode.toUpperCase()),
        ].join("");
        document.getElementById(ringElementId).innerHTML = renderRingView(
          data.before,
        );
        document.getElementById(assignmentElementId).innerHTML =
          data.before.assignments
            .map(
              (assignment) =>
                `<span class="chip"><strong>${assignment.keyLabel}</strong> → <span style="color:${assignment.serverColor}">${assignment.serverLabel}</span></span>`,
            )
            .join("");
      }

      function renderNodeChange(data) {
        const afterServers = data.servers.filter((server) => server.active).length;
        document.getElementById("change-state-strip").innerHTML = [
          statePill("mode", data.mode.toUpperCase()),
          statePill("current", `${afterServers} servers`),
          statePill("moved", `${data.movedKeyCount} keys`),
          statePill("keys", `${data.totalKeys} total`),
        ].join("");
        document.getElementById("change-server-board").innerHTML = renderServerBoard(data.servers);
        document.getElementById("change-stats").innerHTML = [
          statCard("현재 서버 수", afterServers),
          statCard("전체 키", data.totalKeys),
          statCard("이동 키", data.movedKeyCount),
          statCard(
            "영향 비율",
            `${Math.round((data.movedKeyCount / Math.max(1, data.totalKeys)) * 100)}%`,
          ),
        ].join("");
        document.getElementById("change-after").innerHTML = renderRingView(
          data.after,
        );
        document.getElementById("change-movements").innerHTML = renderMovements(
          data.movements,
          "움직인 키만 강조합니다.",
        );
      }

      function renderServerBoard(servers) {
        return servers
          .map((server) => `
            <article class="server-tile ${server.state === "disabled" ? "disabled" : ""}">
              <div>
                <div class="server-swatch" style="background:${server.state === "disabled" ? "#9aa4ae" : server.color}"></div>
                <h3>${server.label}</h3>
                <div class="state-strip" style="margin-top:8px">
                  <span class="state-pill"><strong>state</strong>${server.state}</span>
                </div>
              </div>
              <button type="button" ${server.canToggle ? "" : "disabled"} onclick="toggleClusterNode('${server.serverId}')">${server.actionLabel}</button>
            </article>
          `)
          .join("");
      }

      function renderVirtual(data) {
        document.getElementById("virtual-replicas").value = String(
          data.replicas,
        );
        document.getElementById("virtual-state-strip").innerHTML = [
          statePill("replicas", `${data.replicas} / server`),
          statePill(
            "std",
            `${data.singleDistribution.standardDeviation.toFixed(2)} → ${data.virtualDistribution.standardDeviation.toFixed(2)}`,
          ),
          statePill(
            "spread",
            `${data.virtualDistribution.minLoad} - ${data.virtualDistribution.maxLoad}`,
          ),
        ].join("");
        document.getElementById("virtual-single").innerHTML = renderRingView(
          data.singleRing,
        );
        document.getElementById("virtual-ring").innerHTML = renderRingView(
          data.virtualRing,
        );
        document.getElementById("virtual-single-stats").innerHTML =
          renderDistribution(data.singleDistribution);
        document.getElementById("virtual-distribution-stats").innerHTML =
          renderDistribution(data.virtualDistribution);
      }

      function statePill(label, value) {
        return `<span class="state-pill"><strong>${label}</strong>${value}</span>`;
      }

      function renderBuckets(buckets, changedKeys = new Set()) {
        return buckets
          .map((bucket) => {
            const tokens = bucket.keys.length
              ? bucket.keys
                  .map((key) => {
                    const moved = changedKeys.has(key);
                    return `<span class="chip${moved ? " changed-key" : ""}">${key}${moved ? '<span class="chip-badge">moved</span>' : ""}</span>`;
                  })
                  .join("")
              : '<span class="chip">empty</span>';
            return `
                <article class="bucket" style="border-top-color:${bucket.color}">
                    <strong>${bucket.label}</strong>
                    <small>index ${bucket.serverIndex}</small>
                    <div class="token-list">${tokens}</div>
                </article>
            `;
          })
          .join("");
      }

      function renderMovements(movements, emptyMessage) {
        if (!movements || movements.length === 0) {
          return `<span class="chip">${emptyMessage}</span>`;
        }
        return movements
          .map(
            (movement) => `
            <span class="chip moved"><strong>${movement.keyLabel}</strong> ${movement.fromServer} → ${movement.toServer}</span>
        `,
          )
          .join("");
      }

      function renderDistribution(summary) {
        const maxCount = Math.max(
          1,
          ...summary.servers.map((server) => server.keyCount),
        );
        const loads = summary.servers
          .map(
            (server) => `
            <div class="server-load">
                <small>${server.label}</small>
                <div class="bar"><span style="width:${(server.keyCount / maxCount) * 100}%; background:${server.color}"></span></div>
                <strong>${server.keyCount}</strong>
            </div>
        `,
          )
          .join("");

        return `
            <div class="stats">
                ${statCard("설정", summary.label)}
                ${statCard("표준편차", summary.standardDeviation.toFixed(2))}
                ${statCard("최소", summary.minLoad)}
                ${statCard("최대", summary.maxLoad)}
            </div>
            <div class="server-loads">${loads}</div>
        `;
      }

      function renderRingView(ring) {
        const width = 420;
        const height = 320;
        const centerX = 192;
        const centerY = 156;
        const radius = 118;
        const positions = new Map();

        ring.points.forEach((point) => {
          const coords = polarPoint(centerX, centerY, radius, point.angle);
          positions.set(point.id, coords);
        });

        const lines = ring.assignments
          .map((assignment) => {
            const from = positions.get(assignment.keyId);
            const to = positions.get(assignment.targetPointId);
            if (!from || !to) {
              return "";
            }
            return `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="${assignment.moved ? "#d63d4a" : "rgba(31,35,40,0.25)"}" stroke-width="${assignment.moved ? 2.5 : 1.2}" stroke-dasharray="${assignment.moved ? "6 4" : "0"}"></line>`;
          })
          .join("");

        const points = ring.points
          .map((point) => renderPoint(point, positions.get(point.id)))
          .join("");
        return `
            <div class="ring-caption">
                <strong>${ring.title}</strong>
                <small>${ring.assignments.length} keys</small>
            </div>
            <svg viewBox="0 0 ${width} ${height}" width="100%" height="280" aria-label="${ring.title}">
                <circle cx="${centerX}" cy="${centerY}" r="${radius}" fill="none" stroke="rgba(31,35,40,0.72)" stroke-width="4"></circle>
                ${lines}
                ${points}
            </svg>
            <div class="legend">
                <span><i class="dot server"></i> server / virtual node</span>
                <span><i class="dot key"></i> key</span>
                <span><i class="dot moved"></i> moved key path</span>
            </div>
        `;
      }

      function renderPoint(point, coords) {
        if (!coords) {
          return "";
        }
        const labelOffsetX = coords.x >= 192 ? 12 : -12;
        const labelAnchor = coords.x >= 192 ? "start" : "end";
        if (point.type === "key") {
          const stroke = point.state === "moved" ? "#d63d4a" : "#111827";
          return `
                <g>
                    <circle cx="${coords.x}" cy="${coords.y}" r="13" fill="#fff" stroke="${stroke}" stroke-width="3"></circle>
                    <text x="${coords.x}" y="${coords.y + 4}" text-anchor="middle" font-size="11" font-weight="700">${point.label}</text>
                </g>
            `;
        }

        const radius = point.type === "virtual-server" ? 6 : 14;
        const opacity = point.type === "virtual-server" ? 0.86 : 1;
        const stroke =
          point.state === "added"
            ? "#0f9f54"
            : point.state === "removed"
              ? "#d63d4a"
              : "#ffffff";
        const strokeWidth = point.state === "active" ? 2 : 4;
        const label = point.label
          ? `<text x="${coords.x + labelOffsetX}" y="${coords.y + 4}" text-anchor="${labelAnchor}" font-size="12" font-weight="700" fill="#1f2328">${point.label}</text>`
          : "";
        const removedMark =
          point.state === "removed"
            ? `<text x="${coords.x}" y="${coords.y + 5}" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">×</text>`
            : "";
        return `
            <g opacity="${opacity}">
                <circle cx="${coords.x}" cy="${coords.y}" r="${radius}" fill="${point.color}" stroke="${stroke}" stroke-width="${strokeWidth}"></circle>
                ${removedMark}
                ${label}
            </g>
        `;
      }

      function polarPoint(cx, cy, radius, angleDegrees) {
        const radian = ((angleDegrees - 90) * Math.PI) / 180;
        return {
          x: +(cx + Math.cos(radian) * radius).toFixed(2),
          y: +(cy + Math.sin(radian) * radius).toFixed(2),
        };
      }

      function statCard(label, value) {
        return `
            <article class="stat-card">
                <span class="label">${label}</span>
                <strong>${value}</strong>
            </article>
        `;
      }

      function setStatus(message) {
        document.getElementById("app-status").textContent = message;
      }

      function showTopError(error) {
        const status = document.getElementById("app-status");
        status.insertAdjacentHTML(
          "afterend",
          `<div class="error">${error.message}</div>`,
        );
      }
    </script>
  </body>
</html>
