<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Consistent Hash Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        max-width: 1080px;
        margin: 12px auto 32px;
        padding: 0 16px 48px;
        color: #1f2328;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 20px;
        letter-spacing: 0;
      }

      h3 {
        margin: 0 0 8px;
        font-size: 15px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #57606a;
        line-height: 1.55;
      }

      code {
        padding: 2px 5px;
        border-radius: 4px;
        background: #f6f8fa;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.95em;
      }

      button {
        padding: 9px 14px;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        background: #0969da;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        color: #1f2328;
        background: #f6f8fa;
        border: 1px solid #d0d7de;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .status {
        display: inline-block;
        margin-left: 12px;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 12px;
        background: #fff8c5;
        color: #7d4e00;
        white-space: nowrap;
      }

      .status.ready {
        background: #dafbe1;
        color: #1a7f37;
      }

      .status.error {
        background: #ffebe9;
        color: #cf222e;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
      }

      .tabs {
        display: flex;
        flex: 1;
        gap: 4px;
        border-bottom: 1px solid #d0d7de;
      }

      .tab {
        padding: 8px 16px;
        border: 1px solid transparent;
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        color: #57606a;
        cursor: pointer;
        user-select: none;
      }

      .tab.active {
        margin-bottom: -1px;
        border-color: #d0d7de;
        color: #1f2328;
        background: #ffffff;
        font-weight: 600;
      }

      .panel {
        display: none;
        padding-top: 20px;
      }

      .panel.active {
        display: block;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 12px 0 20px;
      }

      .pill {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        padding: 6px 10px;
        border: 1px solid #d0d7de;
        border-radius: 999px;
        background: #f6f8fa;
        font-size: 13px;
      }

      .pill strong {
        color: #57606a;
        font-size: 12px;
      }

      .server-board,
      .hashring-server-board,
      .virtual-server-board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
      }

      .hashring-server-board,
      .virtual-server-board {
        margin-bottom: 16px;
      }

      .server-card,
      .section-card {
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #ffffff;
      }

      .server-card {
        display: flex;
        min-height: 210px;
        padding: 12px;
        flex-direction: column;
        justify-content: space-between;
      }

      .hashring-server-card {
        min-height: 168px;
      }

      .server-card.disabled {
        color: #6e7781;
        background: #f6f8fa;
      }

      .server-swatch {
        width: 100%;
        height: 10px;
        margin-bottom: 10px;
        border-radius: 999px;
      }

      .server-index {
        display: inline-flex;
        margin-bottom: 8px;
        padding: 3px 7px;
        border-radius: 999px;
        background: #f6f8fa;
        color: #57606a;
        font-size: 12px;
        font-weight: 600;
      }

      .key-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .chip {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        padding: 6px 9px;
        border-radius: 999px;
        background: #f6f8fa;
        font-size: 13px;
      }

      .chip.changed {
        border: 1px solid rgba(207, 34, 46, 0.25);
        color: #a40e26;
        background: #ffebe9;
        font-weight: 600;
      }

      .section-card {
        padding: 16px;
      }

      .ring-shell {
        min-height: 560px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #f6f8fa;
        overflow: hidden;
      }

      .legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 10px;
        color: #57606a;
        font-size: 12px;
      }

      .legend span {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      .dot.server {
        background: #0969da;
      }

      .dot.key {
        background: #ffffff;
        border: 2px solid #1f2328;
      }

      .dot.virtual {
        background: #8c959f;
      }

      .load-bar {
        height: 8px;
        margin-top: 10px;
        border-radius: 999px;
        background: #eaeef2;
        overflow: hidden;
      }

      .load-bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
      }

      .empty {
        color: #57606a;
        font-size: 13px;
      }

      select {
        padding: 8px 12px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2328;
        font: inherit;
      }

      @media (max-width: 860px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column-reverse;
        }

        .tabs {
          width: 100%;
        }

        .panel-head {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="tabs">
        <div class="tab active" data-tab="modulo">Modulo Hash</div>
        <div class="tab" data-tab="hashring">Hash Ring</div>
        <div class="tab" data-tab="virtual">Virtual Nodes</div>
      </div>
      <span id="app-status" class="status">loading</span>
    </div>

    <section class="panel active" data-panel="modulo">
      <div class="panel-head">
        <div>
          <h2>Modulo Hash</h2>
          <p>See how <code>hash(key) % N</code> changes when the server count changes.</p>
        </div>
        <div class="actions">
          <button id="modulo-add-key" type="button">Add Key</button>
          <button id="modulo-reset-keys" class="secondary" type="button">Reset</button>
        </div>
      </div>
      <div id="modulo-meta" class="meta"></div>
      <div id="modulo-server-board" class="server-board"></div>
    </section>

    <section class="panel" data-panel="hashring">
      <div class="panel-head">
        <div>
          <h2>Hash Ring</h2>
          <p>Keys move clockwise to the next enabled server.</p>
        </div>
        <div class="actions">
          <button id="hashring-add-key" type="button">Add Key</button>
          <button id="hashring-reset" class="secondary" type="button">Reset</button>
        </div>
      </div>
      <div id="hashring-server-board" class="hashring-server-board"></div>
      <div class="section-card">
        <div id="hashring-view" class="ring-shell"></div>
        <div class="legend">
          <span><i class="dot server"></i>server</span>
          <span><i class="dot key"></i>key</span>
        </div>
      </div>
    </section>

    <section class="panel" data-panel="virtual">
      <div class="panel-head">
        <div>
          <h2>Virtual Nodes</h2>
          <p>Each server owns many small positions on the ring.</p>
        </div>
        <div class="actions">
          <select id="virtual-replicas" aria-label="Virtual nodes per server">
            <option value="4">4 nodes/server</option>
            <option value="8">8 nodes/server</option>
            <option value="16">16 nodes/server</option>
            <option value="32">32 nodes/server</option>
            <option value="64">64 nodes/server</option>
          </select>
          <button id="virtual-add-key" type="button">Add Key</button>
          <button id="virtual-reset" class="secondary" type="button">Reset</button>
        </div>
      </div>
      <div id="virtual-server-board" class="virtual-server-board"></div>
      <div class="section-card">
        <div id="virtual-view" class="ring-shell"></div>
        <div class="legend">
          <span><i class="dot virtual"></i>virtual node</span>
          <span><i class="dot key"></i>key</span>
        </div>
      </div>
    </section>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        bindTabs();
        bindControls();
        await loadDashboard();
      });

      function bindTabs() {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            const name = tab.dataset.tab;
            document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
            document.querySelectorAll(".panel").forEach((panel) => panel.classList.remove("active"));
            tab.classList.add("active");
            document.querySelector(`[data-panel="${name}"]`).classList.add("active");
          });
        });
      }

      function bindControls() {
        document.getElementById("modulo-add-key").addEventListener("click", async () => {
          renderModulo(await fetchJson("/api/modulo/keys", { method: "POST" }));
        });

        document.getElementById("modulo-reset-keys").addEventListener("click", async () => {
          renderModulo(await fetchJson("/api/modulo/reset", { method: "POST" }));
        });

        document.getElementById("hashring-add-key").addEventListener("click", async () => {
          renderHashRing(await fetchJson("/api/hashring/keys", { method: "POST" }));
        });

        document.getElementById("hashring-reset").addEventListener("click", async () => {
          renderHashRing(await fetchJson("/api/hashring/reset", { method: "POST" }));
        });

        document.getElementById("virtual-add-key").addEventListener("click", async () => {
          renderVirtualNodes(await fetchJson("/api/virtual/keys", { method: "POST" }));
        });

        document.getElementById("virtual-reset").addEventListener("click", async () => {
          renderVirtualNodes(await fetchJson("/api/virtual/reset", { method: "POST" }));
        });

        document.getElementById("virtual-replicas").addEventListener("change", async (event) => {
          const replicas = event.target.value;
          renderVirtualNodes(await fetchJson(`/api/virtual/replicas?replicas=${encodeURIComponent(replicas)}`, { method: "POST" }));
        });
      }

      async function loadDashboard() {
        try {
          setStatus("loading", "");
          const data = await fetchJson("/api/dashboard");
          renderModulo(data.modulo);
          renderHashRing(data.hashRing);
          renderVirtualNodes(data.virtualNodes);
          setStatus("ready", "ready");
        } catch (error) {
          setStatus("error", "failed");
          console.error(error);
        }
      }

      async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        if (!response.ok) {
          throw new Error(`Request failed: ${response.status}`);
        }
        return response.json();
      }

      async function toggleModuloServer(serverId) {
        renderModulo(await fetchJson(`/api/modulo/toggle?serverId=${encodeURIComponent(serverId)}`, { method: "POST" }));
      }

      async function toggleHashRingServer(serverId) {
        renderHashRing(await fetchJson(`/api/hashring/servers/toggle?serverId=${encodeURIComponent(serverId)}`, { method: "POST" }));
      }

      async function toggleVirtualServer(serverId) {
        renderVirtualNodes(await fetchJson(`/api/virtual/servers/toggle?serverId=${encodeURIComponent(serverId)}`, { method: "POST" }));
      }

      function renderModulo(data) {
        const movedKeys = new Set(data.movements.map((movement) => movement.keyLabel));
        document.getElementById("modulo-meta").innerHTML = [
          pill("formula", data.formula),
        ].join("");

        const bucketByServerId = new Map(data.afterBuckets.map((bucket) => [bucket.serverId, bucket]));
        document.getElementById("modulo-server-board").innerHTML = data.servers
          .map((server) => {
            const bucket = bucketByServerId.get(server.serverId);
            return `
              <article class="server-card ${server.active ? "" : "disabled"}">
                <div>
                  <span class="server-index">index ${bucket ? bucket.serverIndex : "-"}</span>
                  <div class="server-swatch" style="background:${server.active ? server.color : "#8c959f"}"></div>
                  <h3>${server.label}</h3>
                  <div class="key-list">${renderModuloKeys(bucket, movedKeys, server.active)}</div>
                </div>
                <button type="button" ${server.canToggle ? "" : "disabled"} onclick="toggleModuloServer('${server.serverId}')">${server.actionLabel}</button>
              </article>
            `;
          })
          .join("");
      }

      function renderModuloKeys(bucket, movedKeys, active) {
        if (!active) {
          return '<span class="chip">inactive</span>';
        }
        if (!bucket || bucket.keys.length === 0) {
          return '<span class="chip">empty</span>';
        }
        return bucket.keys
          .map((key) => `<span class="chip ${movedKeys.has(key) ? "changed" : ""}">${key}</span>`)
          .join("");
      }

      function renderHashRing(data) {
        document.getElementById("hashring-server-board").innerHTML = renderHashRingServers(data.servers, data.ring.assignments);
        document.getElementById("hashring-view").innerHTML = renderRingView(data.ring);
      }

      function renderHashRingServers(servers, assignments) {
        const keysByServerId = new Map();
        (assignments || []).forEach((assignment) => {
          const keys = keysByServerId.get(assignment.serverId) || [];
          keys.push(assignment.keyLabel);
          keysByServerId.set(assignment.serverId, keys);
        });
        const maxKeyCount = Math.max(1, ...servers.map((server) => server.keyCount));
        return servers
          .map((server) => {
            const width = server.active ? (server.keyCount / maxKeyCount) * 100 : 0;
            const keys = keysByServerId.get(server.serverId) || [];
            return `
              <article class="server-card hashring-server-card ${server.active ? "" : "disabled"}">
                <div>
                  <div class="server-swatch" style="background:${server.active ? server.color : "#8c959f"}"></div>
                  <h3>${server.label}</h3>
                  <div class="key-list">${renderHashRingKeys(keys, server.active)}</div>
                  <div class="load-bar"><span style="width:${width}%; background:${server.color}"></span></div>
                </div>
                <button type="button" ${server.canToggle ? "" : "disabled"} onclick="toggleHashRingServer('${server.serverId}')">${server.actionLabel}</button>
              </article>
            `;
          })
          .join("");
      }

      function renderHashRingKeys(keys, active) {
        if (!active) {
          return '<span class="chip">inactive</span>';
        }
        if (!keys || keys.length === 0) {
          return '<span class="chip">empty</span>';
        }
        return keys.map((key) => `<span class="chip">${key}</span>`).join("");
      }

      function renderVirtualNodes(data) {
        document.getElementById("virtual-replicas").value = String(data.replicas);
        document.getElementById("virtual-server-board").innerHTML = renderVirtualServers(data.servers, data.ring.assignments);
        document.getElementById("virtual-view").innerHTML = renderRingView(data.ring);
      }

      function renderVirtualServers(servers, assignments) {
        const keysByServerId = new Map();
        (assignments || []).forEach((assignment) => {
          const keys = keysByServerId.get(assignment.serverId) || [];
          keys.push(assignment.keyLabel);
          keysByServerId.set(assignment.serverId, keys);
        });
        const maxKeyCount = Math.max(1, ...servers.map((server) => server.keyCount));
        return servers
          .map((server) => {
            const width = server.active ? (server.keyCount / maxKeyCount) * 100 : 0;
            const keys = keysByServerId.get(server.serverId) || [];
            return `
              <article class="server-card hashring-server-card ${server.active ? "" : "disabled"}">
                <div>
                  <div class="server-swatch" style="background:${server.active ? server.color : "#8c959f"}"></div>
                  <h3>${server.label}</h3>
                  <div class="key-list">
                    ${renderVirtualKeys(keys, server.active)}
                  </div>
                  <div class="load-bar"><span style="width:${width}%; background:${server.color}"></span></div>
                </div>
                <button type="button" ${server.canToggle ? "" : "disabled"} onclick="toggleVirtualServer('${server.serverId}')">${server.actionLabel}</button>
              </article>
            `;
          })
          .join("");
      }

      function renderVirtualKeys(keys, active) {
        if (!active) {
          return '<span class="chip">inactive</span>';
        }
        if (!keys || keys.length === 0) {
          return '<span class="chip">empty</span>';
        }
        return keys.map((key) => `<span class="chip">${key}</span>`).join("");
      }

      function renderRingView(ring) {
        const width = 760;
        const height = 560;
        const centerX = 380;
        const centerY = 280;
        const radius = 220;
        const positions = new Map();
        ring.points.forEach((point) => {
          positions.set(point.id, polarPoint(centerX, centerY, radius, point.angle));
        });

        const lines = ring.assignments
          .map((assignment) => {
            const from = positions.get(assignment.keyId);
            const to = positions.get(assignment.targetPointId);
            if (!from || !to) {
              return "";
            }
            return `<line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" stroke="rgba(31,35,40,0.18)" stroke-width="1.2" stroke-dasharray="4 5"></line>`;
          })
          .join("");

        const points = ring.points.map((point) => renderPoint(point, positions.get(point.id), centerX)).join("");
        return `
          <svg viewBox="0 0 ${width} ${height}" width="100%" height="540" aria-label="${ring.title}">
            <circle cx="${centerX}" cy="${centerY}" r="${radius}" fill="none" stroke="#8c959f" stroke-width="2"></circle>
            ${lines}
            ${points}
          </svg>
        `;
      }

      function renderPoint(point, coords, centerX) {
        if (!coords) {
          return "";
        }
        const labelOffsetX = coords.x >= centerX ? 13 : -13;
        const labelAnchor = coords.x >= centerX ? "start" : "end";
        if (point.type === "key") {
          return `
            <g>
              <circle cx="${coords.x}" cy="${coords.y}" r="13" fill="#fff" stroke="#1f2328" stroke-width="2.2"></circle>
              <text x="${coords.x}" y="${coords.y + 4}" text-anchor="middle" font-size="10" font-weight="800" fill="#1f2328">${point.label}</text>
            </g>
          `;
        }
        if (point.type === "virtual-server") {
          return `
            <g opacity="0.72">
              <circle cx="${coords.x}" cy="${coords.y}" r="4" fill="${point.color}" stroke="#fff" stroke-width="1"></circle>
            </g>
          `;
        }
        return `
          <g>
            <circle cx="${coords.x}" cy="${coords.y}" r="14" fill="${point.color}" stroke="#fff" stroke-width="2"></circle>
            <text x="${coords.x + labelOffsetX}" y="${coords.y + 4}" text-anchor="${labelAnchor}" font-size="12" font-weight="700" fill="#1f2328">${point.label}</text>
          </g>
        `;
      }

      function polarPoint(cx, cy, radius, angleDegrees) {
        const radian = ((angleDegrees - 90) * Math.PI) / 180;
        return {
          x: +(cx + Math.cos(radian) * radius).toFixed(2),
          y: +(cy + Math.sin(radian) * radius).toFixed(2),
        };
      }

      function pill(label, value) {
        return `<span class="pill"><strong>${label}</strong>${value}</span>`;
      }

      function setStatus(state, label) {
        const element = document.getElementById("app-status");
        element.className = `status ${state}`;
        element.textContent = label || state;
      }
    </script>
  </body>
</html>
